---
# При запуске keepalived с SELinux может потребоваться компиляция
# правил. Переопределите этот список путями к файлам для компиляции.
keepalived_selinux_compile_rules:
  - keepalived_ping
  - keepalived_setpgid

# Для keepalived могут быть определены скрипты, которые запускают
# скрипты уведомлений. Примеры приведены ниже и в каталоге tests.
# keepalived_scripts:
#   - dst: "/etc/keepalived/haproxy_check.sh"
#     content: |
#       #!/bin/sh
#       /usr/bin/curl http://127.0.0.1
#     mode: "0755"  # можно не указывать, дефолт 0755
keepalived_scripts: []

# Скрипты keepalived могут зависеть от дополнительных пакетов.
keepalived_scripts_packages: []

# Время жизни кэша менеджера пакетов.
# По истечении этого времени роль обновит кэш менеджера пакетов.
# Эта переменная будет удалена после исправления ошибок в ansible upstream.
cache_timeout: 600

keepalived_bind_on_non_local: false

# При фейловере VIP некоторые приложения могут «зависать»,
# повторяя отправку данных без обновления ARP.
# Эта переменная задаёт количество повторов, после которых
# ядро считает соединение мёртвым. Она напрямую влияет
# на скорость фейловера VIP.
# Значение sysctl по умолчанию — 15, что даёт ~13 минут восстановления.
# 8 повторов — минимум по RFC 1122 и даёт таймаут ~100 секунд.
# Oracle рекомендует значение 3 для конфигураций RAC,
# что может быть слишком агрессивно для некоторых сценариев.
keepalived_sysctl_tcp_retries: 8

# Добавлять ли systemd override для keepalived:
# Wants=network-online.target
# After=network-online.target
keepalived_systemd_overrides: true

# Добавлять ли опцию systemd Restart=always
# Зависит от keepalived_systemd_overrides, для добавления обе должны быть True
keepalived_systemd_override_service_restart: false

# Путь к файлу с опциями демона keepalived
# Для Debian-подобных систем обычно /etc/default/keepalived
# Для RedHat-подобных систем обычно /etc/sysconfig/keepalived
keepalived_daemon_options_file_path: "{{ _keepalived_daemon_options_file_path }}"

# Переопределение дополнительных аргументов демона keepalived,
# которые будут применены внутри файла keepalived_daemon_options_file_path.
# Пример:
# keepalived_daemon_default_options_overrides:
#   - "DAEMON_ARGS='--snmp'"
keepalived_daemon_default_options_overrides: []
